<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Wallet</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="app">
        <header>
            <h1>Nebula Wallet</h1>
            <button id="installBtn" style="display:none;">Установить на ПК</button>
        </header>

        <main>
            <div class="balance-card">
                <h2>Общий баланс</h2>
                <p id="total-balance">$0.00</p>
            </div>

            <div class="assets">
                <h3>Активы</h3>
                <ul id="asset-list">
                    <li>Bitcoin (BTC): 0.00</li>
                    <li>Ethereum (ETH): 0.00</li>
                    <li>USDT: 0.00</li>
                </ul>
            </div>

            <button id="action-btn">Перевести средства</button>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
