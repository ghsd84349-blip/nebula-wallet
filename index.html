<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebula Space Wallet</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <header class="top-nav">
            <div class="profile-section">
                <div class="avatar"></div>
                <div class="user-info">
                    <span class="greeting">Добро пожаловать,</span>
                    <span class="wallet-address">0x...Nebula</span>
                </div>
            </div>
            <div class="top-actions">
                <button class="icon-btn" id="installBtn" style="display:none;">💻</button>
                <button class="icon-btn">⚙️</button>
            </div>
        </header>

        <section class="balance-section">
            <p class="balance-label">Общий баланс</p>
            <h1 class="total-balance">$0.00</h1>
            <div class="balance-changes positive">
                <span>+0.00% (24ч)</span>
            </div>
        </section>

        <section class="action-buttons">
            <button class="action-btn">
                <div class="btn-icon">⬆️</div>
                <span>Отправить</span>
            </button>
            <button class="action-btn">
                <div class="btn-icon">⬇️</div>
                <span>Получить</span>
            </button>
            <button class="action-btn" id="open-p2p">
                <div class="btn-icon">🔄</div>
                <span>P2P</span>
            </button>
            <button class="action-btn">
                <div class="btn-icon">💱</div>
                <span>Обмен</span>
            </button>
        </section>

        <section class="search-section">
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="crypto-search" placeholder="Поиск криптовалюты...">
            </div>
        </section>

        <section class="assets-section">
            <div class="section-header">
                <h2>Ваши активы</h2>
            </div>
            <div class="assets-list" id="assets-container">
                </div>
        </section>

        <div class="modal-overlay" id="p2p-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Nebula P2P Торговля</h2>
                    <button class="close-btn" id="close-p2p">✖</button>
                </div>
                <div class="modal-body">
                    <p>Рынок открыт. Здесь вы можете покупать и продавать криптовалюту напрямую.</p>
                    <button class="primary-btn" style="margin-top: 20px;">Создать ордер</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
